<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/login.css">
    </head>

    <body>
        <div style="display:flex; align-items:center; justify-content:center; gap:24px; flex-wrap:wrap; width:100%;">
            <div style="padding:24px 28px; border-radius:16px; background:rgba(255,255,255,0.9); box-shadow:0 8px 20px rgba(0,0,0,0.08); text-align:center;">
                <div style="font-size:48px; margin-bottom:8px;">🛍️</div>
                <div style="font-size:28px; font-weight:700; color:#be185d;">LOGIN</div>
                <div style="font-size:14px; color:#6b7280; margin-top:4px;">Welcome back</div>
            </div>

            <form action="./login" method="post">
                Enter Username: <input type="text" name="user"/><br/>
                Enter Password: <input type="password" name="pass"/><br/>
                <input type="submit" value="LOGIN"/>
            </form>
        </div>
    </body>
</html>
